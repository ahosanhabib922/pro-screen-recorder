<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Phone Mic — Pro Screen Recorder</title>
  <style>
    :root{--bg:#0f1117;--panel:#1c1f29;--border:#2b2f3d;--text:#e7e9f0;--muted:#8b91a5;--red:#ef4444;--green:#22c55e;--accent:#6366f1;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:20px;max-width:480px;margin:0 auto;-webkit-text-size-adjust:100%;}
    h1{font-size:19px;display:flex;gap:8px;align-items:center;margin-bottom:4px;}
    .dot{width:11px;height:11px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red);}
    p.muted{color:var(--muted);font-size:13px;margin-bottom:16px;}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
    label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px;}
    input{width:100%;background:#12141b;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:13px;font:700 22px/1 monospace;letter-spacing:6px;text-align:center;text-transform:uppercase;}
    input:focus{outline:1px solid var(--accent);}
    button{cursor:pointer;border:none;border-radius:11px;font:inherit;font-weight:700;color:#fff;width:100%;padding:15px;font-size:16px;background:var(--red);margin-top:14px;}
    button:hover{filter:brightness(1.1);}
    button:disabled{opacity:.45;}
    .status{font-size:14px;margin-top:14px;padding:11px 13px;border-radius:10px;background:#12141b;border:1px solid var(--border);}
    .status.ok{border-color:var(--green);color:var(--green);}
    .status.err{border-color:var(--red);color:#f87171;}
    .meter{height:12px;background:#12141b;border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-top:14px;}
    .meter>div{height:100%;width:0;background:linear-gradient(90deg,var(--green),#eab308,var(--red));transition:width .05s;}
    .hint{font-size:12px;color:var(--muted);margin-top:14px;}
  </style>
</head>
<body>
  <h1><span class="dot"></span> Phone Mic</h1>
  <p class="muted">কম্পিউটারের recorder-এ দেখানো কোডটা নিচে দিন (QR স্ক্যান করলে এমনিতেই বসে যাবে)।</p>

  <div class="card">
    <label>কানেকশন কোড</label>
    <input id="code" maxlength="6" placeholder="——————" autocomplete="off" autocapitalize="characters" inputmode="text">
    <button id="go">🎙 মাইক চালু ও কানেক্ট</button>
    <div class="meter" id="meterWrap" style="display:none"><div id="bar"></div></div>
  </div>

  <div class="status" id="status">প্রস্তুত।</div>
  <p class="hint">কানেক্ট হওয়ার পর এই ট্যাব খোলা রাখুন আর ফোন lock হতে দেবেন না — নাহলে মাইক বন্ধ হয়ে যাবে।</p>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const setStatus = (m, c) => { const s = $('status'); s.textContent = m; s.className = 'status' + (c ? ' ' + c : ''); };

    // Prefill code from the QR link (?id=ABC123)
    const urlId = new URLSearchParams(location.search).get('id');
    if (urlId) $('code').value = urlId.toUpperCase();

    let peer = null, localStream = null;

    function startMeter(stream) {
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      const src = ac.createMediaStreamSource(stream);
      const an = ac.createAnalyser(); an.fftSize = 512;
      src.connect(an);
      const buf = new Uint8Array(an.frequencyBinCount);
      $('meterWrap').style.display = 'block';
      const tick = () => {
        an.getByteTimeDomainData(buf);
        let peak = 0;
        for (let i = 0; i < buf.length; i++) peak = Math.max(peak, Math.abs(buf[i] - 128));
        $('bar').style.width = Math.min(100, (peak / 128) * 140) + '%';
        requestAnimationFrame(tick);
      };
      tick();
    }

    $('go').onclick = async () => {
      const code = $('code').value.trim().toUpperCase();
      if (code.length < 6) { setStatus('৬ অক্ষরের কোডটা দিন', 'err'); return; }
      $('go').disabled = true;
      try {
        setStatus('মাইকের অনুমতি চাওয়া হচ্ছে…');
        localStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, channelCount: 1 }
        });
        startMeter(localStream);

        setStatus('recorder-এর সাথে কানেক্ট হচ্ছে…');
        peer = new Peer({ debug: 0 });   // random id; we only need to *call* the recorder
        peer.on('open', () => {
          const call = peer.call('psr-' + code, localStream);
          if (!call) { setStatus('কানেকশন শুরু করা গেল না — কোড চেক করুন', 'err'); $('go').disabled = false; return; }
          call.on('iceStateChanged', (st) => {
            if (st === 'connected' || st === 'completed') setStatus('✔ কানেক্টেড — মাইক এখন recorder-এ যাচ্ছে।', 'ok');
            else if (st === 'failed' || st === 'disconnected') setStatus('কানেকশন বিচ্ছিন্ন হয়েছে।', 'err');
          });
          call.on('close', () => setStatus('কানেকশন বন্ধ হয়েছে। আবার চেষ্টা করুন।', 'err'));
        });
        peer.on('error', (err) => {
          if (err.type === 'peer-unavailable') setStatus('এই কোডে কোনো recorder পাওয়া যায়নি — কোড/recorder চেক করুন', 'err');
          else setStatus('সমস্যা: ' + err.type, 'err');
          $('go').disabled = false;
        });
      } catch (e) {
        setStatus('মাইক পাওয়া যায়নি: ' + e.message + ' (পেজটা HTTPS দিয়ে খুলুন)', 'err');
        $('go').disabled = false;
      }
    };
  </script>
</body>
</html>

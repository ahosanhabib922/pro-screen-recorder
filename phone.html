<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Phone Mic — Pro Screen Recorder</title>
  <style>
    :root{--bg:#0f1117;--panel:#1c1f29;--border:#2b2f3d;--text:#e7e9f0;--muted:#8b91a5;--red:#ef4444;--green:#22c55e;--accent:#6366f1;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:20px;max-width:480px;margin:0 auto;-webkit-text-size-adjust:100%;}
    h1{font-size:19px;display:flex;gap:8px;align-items:center;margin-bottom:4px;}
    .dot{width:11px;height:11px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red);}
    p.muted{color:var(--muted);font-size:13px;margin-bottom:16px;}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
    label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px;}
    input{width:100%;background:#12141b;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:13px;font:700 22px/1 monospace;letter-spacing:6px;text-align:center;text-transform:uppercase;}
    input:focus{outline:1px solid var(--accent);}
    button{cursor:pointer;border:none;border-radius:11px;font:inherit;font-weight:700;color:#fff;width:100%;padding:15px;font-size:16px;background:var(--red);margin-top:12px;}
    button.ghost{background:#12141b;border:1px solid var(--border);color:var(--text);}
    button:hover{filter:brightness(1.1);}
    button:disabled{opacity:.45;}
    .or{text-align:center;color:var(--muted);font-size:12px;margin:12px 0 2px;}
    .scan-wrap{display:none;margin-top:12px;border-radius:12px;overflow:hidden;position:relative;background:#000;}
    .scan-wrap video{width:100%;display:block;}
    .scan-frame{position:absolute;inset:14%;border:3px solid rgba(255,255,255,.85);border-radius:14px;box-shadow:0 0 0 100vmax rgba(0,0,0,.35);}
    .status{font-size:14px;margin-top:14px;padding:11px 13px;border-radius:10px;background:#12141b;border:1px solid var(--border);}
    .status.ok{border-color:var(--green);color:var(--green);}
    .status.err{border-color:var(--red);color:#f87171;}
    .meter{height:12px;background:#12141b;border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-top:14px;}
    .meter>div{height:100%;width:0;background:linear-gradient(90deg,var(--green),#eab308,var(--red));transition:width .05s;}
    .hint{font-size:12px;color:var(--muted);margin-top:14px;}
  </style>
</head>
<body>
  <h1><span class="dot"></span> Phone Mic</h1>
  <p class="muted">recorder-এর QR স্ক্যান করুন, অথবা কোডটা টাইপ করুন — যেটা সহজ।</p>

  <div class="card">
    <button id="scan" class="ghost">📷 QR স্ক্যান করুন</button>
    <div class="scan-wrap" id="scanWrap">
      <video id="video" playsinline muted></video>
      <div class="scan-frame"></div>
    </div>

    <div class="or">— অথবা কোড টাইপ করুন —</div>
    <label style="margin-top:8px">কানেকশন কোড</label>
    <input id="code" maxlength="6" placeholder="——————" autocomplete="off" autocapitalize="characters" inputmode="text">
    <button id="go">🎙 মাইক চালু ও কানেক্ট</button>
    <div class="meter" id="meterWrap" style="display:none"><div id="bar"></div></div>
  </div>

  <div class="status" id="status">প্রস্তুত।</div>
  <p class="hint">কানেক্ট হওয়ার পর এই ট্যাব খোলা রাখুন আর ফোন lock হতে দেবেন না — নাহলে মাইক বন্ধ হয়ে যাবে।</p>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const setStatus = (m, c) => { const s = $('status'); s.textContent = m; s.className = 'status' + (c ? ' ' + c : ''); };

    // Prefill code from a QR link opened directly (?id=ABC123)
    const urlId = new URLSearchParams(location.search).get('id');
    if (urlId) $('code').value = urlId.toUpperCase();

    let peer = null, localStream = null;

    /* ---------- extract a 6-char code from scanned text (URL or raw) ---------- */
    function parseCode(text) {
      try {
        const u = new URL(text);
        const id = u.searchParams.get('id');
        if (id) return id.toUpperCase();
      } catch (e) { /* not a URL */ }
      const m = String(text).trim().toUpperCase().match(/[A-Z0-9]{6}/);
      return m ? m[0] : null;
    }

    /* ---------- in-page QR scanner ---------- */
    let scanStream = null, scanRAF = 0;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    function camErrMsg(e) {
      const n = e && e.name;
      if (n === 'NotAllowedError' || n === 'SecurityError')
        return 'ক্যামেরার অনুমতি দেওয়া হয়নি — ব্রাউজারের 🔒/সেটিংসে Camera "Allow" করুন, নয়তো নিচে কোড টাইপ করুন';
      if (n === 'NotReadableError' || n === 'TrackStartError')
        return 'ক্যামেরা অন্য অ্যাপে চালু আছে — সেটা বন্ধ করে আবার চেষ্টা করুন, নয়তো কোড টাইপ করুন';
      if (n === 'NotFoundError' || n === 'OverconstrainedError')
        return 'ক্যামেরা পাওয়া যায়নি — নিচে কোডটা টাইপ করে কানেক্ট করুন';
      return 'ক্যামেরা চালু করা গেল না (' + (n || (e && e.message)) + ') — কোড টাইপ করে দিন';
    }

    async function startScan() {
      if (!window.jsQR) { setStatus('QR স্ক্যানার লোড হয়নি — নিচে কোড টাইপ করে দিন', 'err'); return; }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('এই ব্রাউজারে ক্যামেরা সাপোর্ট নেই — কোড টাইপ করে দিন', 'err'); return;
      }
      setStatus('ক্যামেরা চালু হচ্ছে… recorder-এর QR ফোকাস করুন');
      // Try the back camera first, then fall back to any available camera.
      const attempts = [
        { video: { facingMode: { ideal: 'environment' } } },
        { video: true }
      ];
      let lastErr = null;
      for (const c of attempts) {
        try { scanStream = await navigator.mediaDevices.getUserMedia(c); break; }
        catch (e) { lastErr = e; }
      }
      if (!scanStream) { setStatus(camErrMsg(lastErr), 'err'); return; }
      try {
        const video = $('video');
        video.srcObject = scanStream;
        await video.play();
        $('scanWrap').style.display = 'block';
        $('scan').textContent = '✕ স্ক্যান বন্ধ করুন';
        scanRAF = requestAnimationFrame(scanTick);
      } catch (e) {
        stopScan();
        setStatus(camErrMsg(e), 'err');
      }
    }

    function scanTick() {
      const video = $('video');
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const result = window.jsQR ? jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' }) : null;
        if (result) {
          const code = parseCode(result.data);
          if (code) {
            stopScan();
            $('code').value = code;
            setStatus('QR পাওয়া গেছে ✔ কানেক্ট হচ্ছে…', 'ok');
            connect();
            return;
          }
        }
      }
      scanRAF = requestAnimationFrame(scanTick);
    }

    function stopScan() {
      if (scanRAF) cancelAnimationFrame(scanRAF);
      scanRAF = 0;
      if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
      $('scanWrap').style.display = 'none';
      $('scan').textContent = '📷 QR স্ক্যান করুন';
    }

    $('scan').onclick = () => { scanStream ? stopScan() : startScan(); };

    /* ---------- audio level meter ---------- */
    function startMeter(stream) {
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      const src = ac.createMediaStreamSource(stream);
      const an = ac.createAnalyser(); an.fftSize = 512;
      src.connect(an);
      const buf = new Uint8Array(an.frequencyBinCount);
      $('meterWrap').style.display = 'block';
      const tick = () => {
        an.getByteTimeDomainData(buf);
        let peak = 0;
        for (let i = 0; i < buf.length; i++) peak = Math.max(peak, Math.abs(buf[i] - 128));
        $('bar').style.width = Math.min(100, (peak / 128) * 140) + '%';
        requestAnimationFrame(tick);
      };
      tick();
    }

    function micErrMsg(e) {
      const n = e && e.name;
      if (n === 'NotAllowedError' || n === 'SecurityError')
        return 'মাইকের অনুমতি দেওয়া হয়নি — ব্রাউজারের 🔒/সেটিংসে Microphone "Allow" করে পেজ refresh করুন';
      if (n === 'NotReadableError' || n === 'TrackStartError')
        return 'মাইক অন্য অ্যাপে চালু আছে — সেটা (কল/রেকর্ডার) বন্ধ করে আবার চেষ্টা করুন';
      if (n === 'NotFoundError')
        return 'এই ফোনে কোনো মাইক পাওয়া যায়নি';
      return 'মাইক চালু করা গেল না (' + (n || (e && e.message)) + ') — HTTPS দিয়ে খুলেছেন তো?';
    }

    async function getMic() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia)
        throw Object.assign(new Error('no getUserMedia'), { name: 'NotFoundError' });
      // Full processing first; if a device rejects the constraints, fall back to plain audio.
      const attempts = [
        { audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } },
        { audio: true }
      ];
      let lastErr;
      for (const c of attempts) {
        try { return await navigator.mediaDevices.getUserMedia(c); }
        catch (e) { lastErr = e; if (e && (e.name === 'NotAllowedError' || e.name === 'NotReadableError')) break; }
      }
      throw lastErr;
    }

    /* ---------- connect mic to the recorder over the PeerJS relay ---------- */
    async function connect() {
      const code = $('code').value.trim().toUpperCase();
      if (code.length < 6) { setStatus('৬ অক্ষরের কোডটা দিন', 'err'); return; }
      $('go').disabled = true;
      try {
        if (!localStream) {
          setStatus('মাইকের অনুমতি চাওয়া হচ্ছে…');
          try { localStream = await getMic(); }
          catch (e) { setStatus(micErrMsg(e), 'err'); $('go').disabled = false; return; }
          startMeter(localStream);
        }
        setStatus('recorder-এর সাথে কানেক্ট হচ্ছে…');
        if (peer) { try { peer.destroy(); } catch (e) {} }
        peer = new Peer({ debug: 0 });   // random id; we only need to *call* the recorder
        peer.on('open', () => {
          const call = peer.call('psr-' + code, localStream);
          if (!call) { setStatus('কানেকশন শুরু করা গেল না — কোড চেক করুন', 'err'); $('go').disabled = false; return; }
          call.on('iceStateChanged', (st) => {
            if (st === 'connected' || st === 'completed') setStatus('✔ কানেক্টেড — মাইক এখন recorder-এ যাচ্ছে।', 'ok');
            else if (st === 'failed' || st === 'disconnected') setStatus('কানেকশন বিচ্ছিন্ন হয়েছে।', 'err');
          });
          call.on('close', () => setStatus('কানেকশন বন্ধ হয়েছে। আবার চেষ্টা করুন।', 'err'));
        });
        peer.on('error', (err) => {
          if (err.type === 'peer-unavailable') setStatus('এই কোডে কোনো recorder পাওয়া যায়নি — কোড/recorder চেক করুন', 'err');
          else setStatus('সমস্যা: ' + err.type, 'err');
          $('go').disabled = false;
        });
      } catch (e) {
        setStatus('কানেক্ট করা গেল না: ' + (e && e.message), 'err');
        $('go').disabled = false;
      }
    }

    $('go').onclick = connect;
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  #canvas {
    width: 1400px; height: 560px;
    display: flex; align-items: center; gap: 40px; padding: 0 70px;
  }
  .left { flex: 1.1; }
  .brandrow { display: flex; align-items: center; gap: 18px; margin-bottom: 26px; }
  .logo-mark { width: 58px; height: 58px; }
  .logo-mark span { width: 26px; height: 26px; }
  .brand { font-size: 46px; }
  h1 { font-size: 30px; font-weight: 700; line-height: 1.25; margin-bottom: 16px; }
  h1 b { color: #ef4444; }
  .tag { font-size: 18px; margin-bottom: 28px; }
  .chips { display: flex; flex-wrap: wrap; gap: 10px; max-width: 560px; }
  .chip { font-size: 14px; padding: 8px 16px; }

  .right { flex: 1; position: relative; }
  .rec-card { width: 560px; padding: 22px; }
  .rec-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .timer { font-size: 34px; }
  .rec-chip { font-size: 13px; padding: 6px 14px; }
  .screenmock { height: 250px; }
  .content { padding: 18px; display: flex; flex-direction: column; gap: 10px; }
  .btnrow { display: flex; gap: 10px; margin-top: 16px; }
  .btn { flex: 1; padding: 12px 0; font-size: 14px; }
  .bubble {
    position: absolute; left: -34px; bottom: 74px;
    width: 140px; height: 140px; border-radius: 50%;
    border: 4px solid #ef4444; overflow: hidden;
    box-shadow: 0 18px 50px rgba(0,0,0,.6), 0 0 30px rgba(239,68,68,.35);
    background: radial-gradient(90px 90px at 50% 38%, #f5c9a8 0 34%, transparent 35%),
                radial-gradient(140px 90px at 50% 105%, #4b5273 0 55%, transparent 56%),
                linear-gradient(180deg, #2a2f42, #1a1d2b);
  }
</style>
</head>
<body>
  <div id="canvas" class="canvas">
    <div class="left">
      <div class="brandrow">
        <div class="logo-mark"><span></span></div>
        <div class="brand">Pro Screen Recorder</div>
      </div>
      <h1>Studio-quality screen recording,<br><b>right inside Chrome</b></h1>
      <div class="tag">Screen · Window · Tab — with crystal-clear mixed audio</div>
      <div class="chips">
        <span class="chip">🎥 4K · 60 fps</span>
        <span class="chip">📦 MP4 &amp; WebM</span>
        <span class="chip">🎙 Mic + Tab audio mix</span>
        <span class="chip">🛡 Anti-clip limiter</span>
        <span class="chip">📷 Camera bubble</span>
        <span class="chip">⏸ Pause / Resume</span>
        <span class="chip">⌨️ Shortcuts</span>
      </div>
    </div>
    <div class="right">
      <div class="rec-card card">
        <div class="rec-top">
          <span class="timer">12:45</span>
          <span class="rec-chip"><i></i> REC</span>
        </div>
        <div class="screenmock">
          <div class="winbar"><b style="background:#ff5f57"></b><b style="background:#febc2e"></b><b style="background:#28c840"></b></div>
          <div class="content">
            <div class="skel" style="width:45%;height:16px"></div>
            <div class="skel" style="width:80%;height:10px"></div>
            <div class="skel" style="width:72%;height:10px"></div>
            <div class="skel" style="width:60%;height:10px"></div>
            <div style="display:flex;gap:10px;margin-top:8px">
              <div class="skel" style="width:110px;height:64px"></div>
              <div class="skel" style="width:110px;height:64px"></div>
              <div class="skel" style="width:110px;height:64px"></div>
            </div>
          </div>
        </div>
        <div class="btnrow">
          <span class="btn">⏸ Pause</span>
          <span class="btn">🎙 Mute</span>
          <span class="btn stop">⏹ Stop &amp; Save</span>
        </div>
      </div>
      <div class="bubble"></div>
    </div>
  </div>
</body>
</html>

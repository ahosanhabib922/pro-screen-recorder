<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  #canvas {
    width: 440px; height: 280px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; text-align: center;
  }
  .logo-mark { width: 64px; height: 64px; }
  .logo-mark span { width: 30px; height: 30px; }
  .brand { font-size: 30px; }
  .tag { font-size: 14px; }
  .chips { display: flex; gap: 8px; }
  .chip { font-size: 11.5px; padding: 5px 12px; }
</style>
</head>
<body>
  <div id="canvas" class="canvas">
    <div class="logo-mark"><span></span></div>
    <div>
      <div class="brand">Pro Screen Recorder</div>
      <div class="tag">Record · Mix · Share — right from Chrome</div>
    </div>
    <div class="chips">
      <span class="chip">4K · 60fps</span>
      <span class="chip">MP4 &amp; WebM</span>
      <span class="chip">Mic + Tab audio</span>
    </div>
  </div>
</body>
</html>
